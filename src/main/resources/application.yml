spring:
  application:
    name: expensetracker
  
  # 1. DATABASE PERSISTENCE CONFIGURATION (POSTGRESQL)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expense_tracker_db}
    username: ${SPRING_DATASOURCE_USERNAME:expensetracker}
    password: ${SPRING_DATASOURCE_PASSWORD:secretpassword}
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pool Settings
    hikari:
      # Allows the pool to shrink to zero
      minimum-idle: 0
      # Maximum concurrent connections
      maximum-pool-size: 5
      # Maximum time (ms) a connection can sit idle before being released
      idle-timeout: 60000
      # Maximum lifetime (ms) of a connection in the pool
      max-lifetime: 1800000
      # Timeout (ms) to wait for a connection from the pool before throwing an exception
      connection-timeout: 30000

  # 2. JPA & HIBERNATE ORM SETTINGS
  jpa:
    hibernate:
      # Automatically validates and updates the database schema on startup
      ddl-auto: update
    show-sql: true 
    properties:
      hibernate:
        # Prettifies the SQL output in the console
        format_sql: true
        # Explicitly defines the dialect for PostgreSQL compatibility
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 3. SMTP MAIL SERVICE CONFIGURATION
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:financetracker.support@gmail.com}
    # Real password must be provided via Environment Variables (.env)
    password: ${SPRING_MAIL_PASSWORD} 
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# 4. API DOCUMENTATION (SWAGGER/OPENAPI)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 5. LOGGING CONFIGURATION FOR SQL DEBUGGING
logging:
  level:
    org:
      hibernate:
        type:
          descriptor:
            sql:
              # Logs detailed SQL parameter binding (useful for development)
              BasicBinder: trace

# 6. JWT SECURITY CONTEXT
app:
  jwt:
    # Default secret for local development.
    secret: ${JWT_SECRET:DefaultDevelopmentSecretKeyMinimum256BitsForProductionSafety}
    # Token validity period (24 hours)
    expirationMs: 86400000

# 7. SERVER PORT
server:
  port: 8081